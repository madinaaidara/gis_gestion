name: guissgestion_boutique
description: Application de gestion commerciale pour boutiques - Gis Gestion

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Base de données SQLite
  sqflite: ^2.3.0
  path: ^1.8.3
  url_launcher: ^6.3.0

  # UI
  cupertino_icons: ^1.0.8

  # SUPABASE
  supabase: ^2.0.0
  supabase_flutter: ^2.0.0

  # UTILITAIRES
  provider: ^6.0.0
  intl: ^0.18.0

  smooth_page_indicator: ^1.0.0
  shared_preferences: ^2.0.0

  google_fonts: ^8.1.0

  flutter_spinkit: ^5.2.1

  fl_chart: ^0.69.0

  table_calendar: ^3.0.9
  

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/images/logo_guiss_gestion1.png
  adaptive_icon_background: "#050505"
  adaptive_icon_foreground: assets/images/logo_guiss_gestion1.png
  web:
    generate: true
    image_path: assets/images/logo_guiss_gestion1.png
    background_color: "#050505"
    theme_color: "#7C5CFF"
  windows:
    generate: true
    image_path: assets/images/logo_guiss_gestion1.png

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/ac1.png
    - assets/images/pro1.png
    - assets/images/ven1.png
    - assets/images/cre1.png
    - assets/images/his1.png
    - assets/images/sta1.png
    - assets/images/logo_guiss_gestion1.png
    - assets/images/acceuil.png
    - assets/images/produits.png
    - assets/images/stats.png
    - assets/images/ventes.png