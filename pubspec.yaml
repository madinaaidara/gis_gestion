name: guissgestion_boutique
description: Application de gestion commerciale pour boutiques - Guiss Gestion

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Base de données SQLite
  sqflite: ^2.3.0
  path: ^1.8.3
  url_launcher: ^6.3.0

  # UI
  cupertino_icons: ^1.0.8

  # SUPABASE
  supabase: ^2.0.0
  supabase_flutter: ^2.0.0

  # UTILITAIRES
  provider: ^6.0.0
  intl: ^0.18.0

  smooth_page_indicator: ^1.0.0
  shared_preferences: ^2.0.0

  google_fonts: ^8.1.0

  flutter_spinkit: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/